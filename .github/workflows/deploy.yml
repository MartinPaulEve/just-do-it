name: Build and Push to ECR Public

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  ECR_REGISTRY: public.ecr.aws/YOUR_ALIAS
  ECR_REPOSITORY: your-org/your-project
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 \
            | docker login --username AWS --password-stdin public.ecr.aws

      - name: Build and push Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_TAG="${IMAGE_TAG::8}"
          docker build \
            -f compose/Dockerfile \
            --target production \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            --build-arg SECRET_KEY=build-only-key \
            .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
