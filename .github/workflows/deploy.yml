name: Build and Push to ECR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  ECR_REGISTRY: 747101050174.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: eve.gd/todo
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_TAG="${IMAGE_TAG::8}"
          docker build \
            -f compose/Dockerfile \
            --target production \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            --build-arg SECRET_KEY=build-only-key \
            .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
