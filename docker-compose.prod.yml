services:
  django:
    image: public.ecr.aws/x3x8a1a3/eve.gd/just-do-it:latest
    ports:
      - "127.0.0.1:${DJANGO_PORT:-8000}:8000"
    env_file:
      - .env.prod
    volumes:
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env.prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-todo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
