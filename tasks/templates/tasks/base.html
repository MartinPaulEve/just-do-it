<!-- tasks/templates/tasks/base.html -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Todo{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'tasks/css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include "tasks/includes/nav.html" %}

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <nav class="bottom-nav">
        <a href="{% url 'tasks:dashboard' %}" class="bottom-nav__link {% if nav_active == 'dashboard' %}bottom-nav__link--active{% endif %}">
            <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Board
        </a>
        <a href="{% url 'tasks:today' %}" class="bottom-nav__link {% if nav_active == 'today' %}bottom-nav__link--active{% endif %}">
            <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Today
        </a>
        <a href="{% url 'tasks:calendar' %}" class="bottom-nav__link {% if nav_active == 'calendar' %}bottom-nav__link--active{% endif %}">
            <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Calendar
        </a>
        <a href="{% url 'tasks:all_tasks' %}" class="bottom-nav__link {% if nav_active == 'all' %}bottom-nav__link--active{% endif %}">
            <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            All
        </a>
    </nav>

    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <script src="{% static 'tasks/js/app.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
