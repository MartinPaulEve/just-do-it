<div class="attachment-item" id="attachment-{{ attachment.pk }}">
    <span>&#128206;</span>
    <a href="{{ attachment.file.url }}" class="attachment-item__link" target="_blank" rel="noopener">
        {{ attachment.filename }}
    </a>
    <button class="attachment-item__delete"
            hx-delete="{% url 'tasks:attachment_delete' attachment.pk %}"
            hx-target="#attachment-{{ attachment.pk }}"
            hx-swap="outerHTML"
            hx-confirm="Remove this file?">&times;</button>
</div>
