{% load task_tags %}
<div class="panel" data-list-id="{{ task_list.pk }}"
     hx-get="{% url 'tasks:panel' task_list.pk %}"
     hx-trigger="every 10s"
     hx-swap="outerHTML">
    <div class="panel__header">
        <div class="panel__title">
            <span class="panel__dot" style="background: {{ task_list.colour }}"></span>
            <span class="panel__name">{{ task_list.name }}</span>
            <span class="panel__count">{{ tasks|length }}</span>
        </div>
        <button class="panel__add-btn"
                hx-get="{% url 'tasks:task_create_form' task_list.pk %}"
                hx-target="#add-task-{{ task_list.pk }}"
                hx-swap="innerHTML">+</button>
    </div>
    <div id="add-task-{{ task_list.pk }}"></div>
    <div class="panel__tasks">
        {% for task in tasks %}
            {% include "tasks/partials/task_card.html" %}
        {% empty %}
            <p class="panel__empty">No tasks yet</p>
        {% endfor %}
    </div>
</div>
