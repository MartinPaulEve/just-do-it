<div class="subtask" id="subtask-{{ task.pk }}">
    <button class="subtask__checkbox {% if task.completed %}subtask__checkbox--checked{% endif %}"
            hx-post="{% url 'tasks:subtask_toggle' task.pk %}"
            hx-target="#subtask-{{ task.pk }}"
            hx-swap="outerHTML">
        {% if task.completed %}&#x2713;{% endif %}
    </button>
    <span class="subtask__title {% if task.completed %}subtask__title--completed{% endif %}">
        {{ task.title }}
    </span>
</div>
