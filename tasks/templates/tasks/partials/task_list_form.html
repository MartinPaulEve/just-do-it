<div class="modal-overlay" onclick="if(event.target===this)document.getElementById('modal-container').textContent=''">
    <div class="modal-box">
        <h3 class="modal-box__title">
            {% if task_list %}Edit List{% else %}New List{% endif %}
        </h3>
        <form class="inline-form" style="background: none; padding: 0;"
              {% if task_list %}
              hx-post="{% url 'tasks:task_list_update' task_list.pk %}"
              {% else %}
              hx-post="{% url 'tasks:task_list_create' %}"
              {% endif %}
              hx-target="body">
            {% csrf_token %}
            {{ form.name }}
            <div class="inline-form__row">
                <label style="font-size: 12px; color: var(--text-secondary);">Colour</label>
                {{ form.colour }}
            </div>
            {{ form.icon }}
            <div class="inline-form__actions" style="margin-top: 8px;">
                <button type="submit" class="btn btn--primary">
                    {% if task_list %}Save{% else %}Create{% endif %}
                </button>
                <button type="button" class="btn btn--ghost"
                        onclick="document.getElementById('modal-container').textContent=''">
                    Cancel
                </button>
                {% if task_list %}
                <button type="button" class="btn btn--danger"
                        hx-delete="{% url 'tasks:task_list_delete' task_list.pk %}"
                        hx-target="body"
                        hx-confirm="Delete this list and all its tasks?">
                    Delete List
                </button>
                {% endif %}
            </div>
        </form>
    </div>
</div>
